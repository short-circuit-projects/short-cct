<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate of Completion | Short Circuit</title>
    <meta name="description" content="View and verify your course completion certificate.">
    <link rel="icon" href="/images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --navy: #0f172a;
            --navy-light: #1e293b;
            --blue: #3b82f6;
            --gold: #d4af37;
            --gold-light: #f5d572;
            --white: #ffffff;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --green: #22c55e;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            color: var(--navy);
        }

        .page-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--blue);
        }

        /* Certificate Container */
        .certificate-wrapper {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .certificate {
            position: relative;
            padding: 60px;
            background: linear-gradient(135deg, #fffdf7 0%, #fff9e6 100%);
            border: 8px solid transparent;
            background-clip: padding-box;
        }

        .certificate::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 3px solid var(--gold);
            border-radius: 8px;
            pointer-events: none;
        }

        /* Corner Decorations */
        .corner-decoration {
            position: absolute;
            width: 80px;
            height: 80px;
        }

        .corner-decoration svg {
            width: 100%;
            height: 100%;
            fill: var(--gold);
            opacity: 0.3;
        }

        .corner-tl { top: 20px; left: 20px; }
        .corner-tr { top: 20px; right: 20px; transform: rotate(90deg); }
        .corner-bl { bottom: 20px; left: 20px; transform: rotate(-90deg); }
        .corner-br { bottom: 20px; right: 20px; transform: rotate(180deg); }

        /* Certificate Content */
        .certificate-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .certificate-header {
            margin-bottom: 32px;
        }

        .certificate-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .certificate-subtitle {
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gray-500);
        }

        .certificate-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .certificate-tagline {
            font-size: 16px;
            color: var(--gray-600);
            margin-bottom: 40px;
        }

        .recipient-section {
            margin-bottom: 40px;
        }

        .recipient-label {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 8px;
        }

        .recipient-name {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--blue);
            border-bottom: 3px solid var(--gold);
            padding-bottom: 8px;
            display: inline-block;
        }

        .course-section {
            margin-bottom: 40px;
        }

        .course-label {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 8px;
        }

        .course-name {
            font-size: 24px;
            font-weight: 600;
            color: var(--navy);
        }

        .completion-date {
            font-size: 14px;
            color: var(--gray-600);
            margin-top: 12px;
        }

        /* Badge */
        .certificate-badge {
            margin: 32px 0;
        }

        .badge-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .badge-icon i {
            font-size: 40px;
            color: var(--white);
        }

        /* Verification */
        .verification-section {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px dashed var(--gray-200);
        }

        .verification-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray-500);
            margin-bottom: 8px;
        }

        .certificate-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--navy);
            background: var(--gray-100);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            display: inline-block;
        }

        .verification-url {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 8px;
        }

        /* Actions Bar */
        .actions-bar {
            background: var(--white);
            padding: 24px;
            display: flex;
            justify-content: center;
            gap: 16px;
            border-top: 1px solid var(--gray-200);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--blue);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-outline {
            background: var(--white);
            color: var(--gray-600);
            border: 1px solid var(--gray-300);
        }

        .btn-outline:hover {
            background: var(--gray-100);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--navy);
        }

        .btn-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        /* Verification Badge */
        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #dcfce7;
            color: var(--green);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 24px;
        }

        /* Loading & Error States */
        .loading-container, .error-container {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 56px;
            height: 56px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-container i {
            font-size: 64px;
            color: #f43f5e;
            margin-bottom: 24px;
        }

        .error-container h2 {
            margin-bottom: 12px;
        }

        .error-container p {
            color: var(--gray-500);
            margin-bottom: 24px;
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }

            .page-container {
                padding: 0;
                max-width: none;
            }

            .back-link,
            .actions-bar {
                display: none !important;
            }

            .certificate-wrapper {
                box-shadow: none;
            }

            .certificate {
                padding: 40px;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .certificate {
                padding: 32px;
            }

            .certificate-title {
                font-size: 28px;
            }

            .recipient-name {
                font-size: 24px;
            }

            .course-name {
                font-size: 18px;
            }

            .actions-bar {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <a href="/account/" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>

        <div id="certificateContent">
            <div class="loading-container">
                <div class="loading-spinner"></div>
                <p>Loading certificate...</p>
            </div>
        </div>
    </div>

    <script>
        const cornerSVG = `<svg viewBox="0 0 100 100"><path d="M0 100 L0 30 Q0 0 30 0 L100 0 L100 10 L30 10 Q10 10 10 30 L10 100 Z"/></svg>`;

        async function loadCertificate() {
            const params = new URLSearchParams(window.location.search);
            const certNumber = params.get('cert');
            const courseId = params.get('course');

            // If course ID is provided, try to generate certificate
            if (courseId && !certNumber) {
                await generateCertificate(courseId);
                return;
            }

            if (!certNumber) {
                showError('No Certificate', 'Please provide a certificate number to view.');
                return;
            }

            try {
                const response = await fetch(`/api/certificates/${certNumber}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        showError('Certificate Not Found', 'This certificate does not exist in our records.');
                    } else {
                        showError('Error Loading Certificate', 'Please try again later.');
                    }
                    return;
                }

                const data = await response.json();
                renderCertificate(data.certificate);

            } catch (error) {
                console.error('Certificate load error:', error);
                showError('Error Loading Certificate', 'Please try again later.');
            }
        }

        async function generateCertificate(courseId) {
            try {
                const response = await fetch(`/api/courses/${courseId}/certificate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include'
                });

                if (!response.ok) {
                    const error = await response.json();
                    showError('Cannot Generate Certificate', error.error || 'Course not completed yet.');
                    return;
                }

                const data = await response.json();
                
                // Update URL with certificate number
                const newUrl = new URL(window.location);
                newUrl.searchParams.delete('course');
                newUrl.searchParams.set('cert', data.certificate.certificate_number);
                window.history.replaceState({}, '', newUrl);
                
                renderCertificate(data.certificate);

            } catch (error) {
                console.error('Certificate generation error:', error);
                showError('Error Generating Certificate', 'Please ensure you are logged in and have completed the course.');
            }
        }

        function renderCertificate(cert) {
            const completionDate = new Date(cert.completion_date || cert.issued_at).toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });

            document.getElementById('certificateContent').innerHTML = `
                <div class="certificate-wrapper">
                    <div class="certificate">
                        <div class="corner-decoration corner-tl">${cornerSVG}</div>
                        <div class="corner-decoration corner-tr">${cornerSVG}</div>
                        <div class="corner-decoration corner-bl">${cornerSVG}</div>
                        <div class="corner-decoration corner-br">${cornerSVG}</div>

                        <div class="certificate-content">
                            <div class="certificate-header">
                                <div class="certificate-logo">
                                    <div class="logo-icon">&#9889;</div>
                                    <span>SHORT CIRCUIT</span>
                                </div>
                                <div class="certificate-subtitle">Project-Based Learning</div>
                            </div>

                            <h1 class="certificate-title">Certificate of Completion</h1>
                            <p class="certificate-tagline">This is to certify that</p>

                            <div class="recipient-section">
                                <div class="recipient-name">${cert.recipient_name}</div>
                            </div>

                            <div class="course-section">
                                <div class="course-label">has successfully completed the course</div>
                                <div class="course-name">${cert.course_title}</div>
                                <div class="completion-date">Completed on ${completionDate}</div>
                            </div>

                            <div class="certificate-badge">
                                <div class="badge-icon">
                                    <i class="fas fa-award"></i>
                                </div>
                            </div>

                            <div class="verified-badge">
                                <i class="fas fa-check-circle"></i>
                                Verified Certificate
                            </div>

                            <div class="verification-section">
                                <div class="verification-label">Certificate ID</div>
                                <div class="certificate-id">${cert.certificate_number}</div>
                                <div class="verification-url">
                                    Verify at: ${window.location.origin}/course/certificate?cert=${cert.certificate_number}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="actions-bar">
                        <button class="btn btn-primary" onclick="window.print()">
                            <i class="fas fa-print"></i>
                            Print Certificate
                        </button>
                        <button class="btn btn-outline" onclick="downloadPDF()">
                            <i class="fas fa-download"></i>
                            Download PDF
                        </button>
                        <button class="btn btn-outline" onclick="shareCertificate('${cert.certificate_number}')">
                            <i class="fas fa-share-alt"></i>
                            Share
                        </button>
                        <button class="btn btn-outline" onclick="copyLink('${cert.certificate_number}')">
                            <i class="fas fa-link"></i>
                            Copy Link
                        </button>
                    </div>
                </div>
            `;
        }

        function showError(title, message) {
            document.getElementById('certificateContent').innerHTML = `
                <div class="error-container">
                    <i class="fas fa-exclamation-circle"></i>
                    <h2>${title}</h2>
                    <p>${message}</p>
                    <a href="/account/" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i>
                        Back to Dashboard
                    </a>
                </div>
            `;
        }

        function downloadPDF() {
            // For now, use print which can save as PDF
            window.print();
        }

        function shareCertificate(certNumber) {
            const url = window.location.origin + '/course/certificate?cert=' + certNumber;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Certificate of Completion - Short Circuit',
                    text: 'I completed a course on Short Circuit!',
                    url: url
                });
            } else {
                copyLink(certNumber);
            }
        }

        function copyLink(certNumber) {
            const url = window.location.origin + '/course/certificate?cert=' + certNumber;
            navigator.clipboard.writeText(url).then(() => {
                alert('Certificate link copied to clipboard!');
            }).catch(() => {
                prompt('Copy this link:', url);
            });
        }

        // Load certificate on page load
        loadCertificate();
    </script>

    <script src="/js/chat-widget.js"></script>
</body>
</html>
