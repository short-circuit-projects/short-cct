<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Short Circuit</title>
    <meta name="description" content="Create a new password for your Short Circuit account.">
    <link rel="icon" href="/images/logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/responsive.css">
    <style>
        :root {
            --navy: #1a2332;
            --electric-blue: #00bfff;
            --coral: #ff6b6b;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --dark-gray: #6c757d;
            --tech-green: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, #2a3a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            margin-bottom: 10px;
        }

        .auth-logo img {
            height: 64px;
            width: auto;
        }

        .auth-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--dark-gray);
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: 0 0 0 3px rgba(0, 191, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--coral), #ff8585);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fff5f5;
            border: 1px solid #ffcccc;
            color: #cc0000;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #f0fff4;
            border: 1px solid #9ae6b4;
            color: #22543d;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        .auth-footer p {
            color: var(--dark-gray);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--electric-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-input {
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--dark-gray);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: var(--electric-blue);
        }

        .password-requirements {
            background: var(--light-gray);
            border-radius: 8px;
            padding: 12px 16px;
            margin-top: 8px;
        }

        .password-requirements ul {
            list-style: none;
            font-size: 12px;
            color: var(--dark-gray);
        }

        .password-requirements li {
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .password-requirements li.valid {
            color: var(--tech-green);
        }

        .password-requirements li::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }

        .password-requirements li.valid::before {
            background: var(--tech-green);
        }

        .invalid-token {
            text-align: center;
            padding: 40px 20px;
        }

        .invalid-token-icon {
            width: 80px;
            height: 80px;
            background: #fff5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .invalid-token-icon svg {
            width: 40px;
            height: 40px;
            color: var(--coral);
        }

        .invalid-token h2 {
            color: var(--navy);
            font-size: 20px;
            margin-bottom: 10px;
        }

        .invalid-token p {
            color: var(--dark-gray);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn-secondary {
            display: inline-block;
            padding: 12px 24px;
            background: var(--electric-blue);
            color: var(--white);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: #0099cc;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--dark-gray);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--electric-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Loading State -->
        <div class="loading" id="loadingState">
            <div class="loading-spinner"></div>
            <p>Validating reset link...</p>
        </div>

        <!-- Invalid Token State -->
        <div class="invalid-token" id="invalidState" style="display: none;">
            <div class="invalid-token-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <h2>Invalid or Expired Link</h2>
            <p id="invalidMessage">This password reset link is no longer valid. Please request a new one.</p>
            <a href="/forgot-password.html" class="btn-secondary">Request New Link</a>
        </div>

        <!-- Reset Form -->
        <div id="resetForm" style="display: none;">
            <div class="auth-header">
                <div class="auth-logo"><img src="/images/logo.png" alt="Short Circuit Logo"></div>
                <h1 class="auth-title">Create New Password</h1>
                <p class="auth-subtitle">Enter your new password below.</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password" name="password" required autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="password-requirements">
                        <ul>
                            <li id="req-length">At least 8 characters</li>
                            <li id="req-letter">Contains a letter</li>
                            <li id="req-number">Contains a number</li>
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)" aria-label="Toggle password visibility">
                            <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Reset Password</button>
            </form>

            <div class="auth-footer">
                <p>Remember your password? <a href="/login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const eyeIcon = button.querySelector('.eye-icon');
            const eyeOffIcon = button.querySelector('.eye-off-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
            } else {
                input.type = 'password';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
            }
        }

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const loadingState = document.getElementById('loadingState');
        const invalidState = document.getElementById('invalidState');
        const resetForm = document.getElementById('resetForm');
        const invalidMessage = document.getElementById('invalidMessage');

        // Validate token on page load
        async function validateToken() {
            if (!token) {
                showInvalidState('No reset token provided.');
                return;
            }

            try {
                const response = await fetch(`/api/auth/validate-reset-token?token=${encodeURIComponent(token)}`);
                const data = await response.json();

                if (data.valid) {
                    loadingState.style.display = 'none';
                    resetForm.style.display = 'block';
                    initializeForm();
                } else {
                    showInvalidState(data.error || 'This reset link is invalid or has expired.');
                }
            } catch (error) {
                showInvalidState('Failed to validate reset link. Please try again.');
            }
        }

        function showInvalidState(message) {
            loadingState.style.display = 'none';
            invalidMessage.textContent = message;
            invalidState.style.display = 'block';
        }

        function initializeForm() {
            const form = document.getElementById('resetPasswordForm');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');

            // Password validation indicators
            const reqLength = document.getElementById('req-length');
            const reqLetter = document.getElementById('req-letter');
            const reqNumber = document.getElementById('req-number');

            passwordInput.addEventListener('input', () => {
                const password = passwordInput.value;
                reqLength.classList.toggle('valid', password.length >= 8);
                reqLetter.classList.toggle('valid', /[a-zA-Z]/.test(password));
                reqNumber.classList.toggle('valid', /[0-9]/.test(password));
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // Reset messages
                errorMessage.classList.remove('show');
                successMessage.classList.remove('show');

                // Validate password
                if (password.length < 8) {
                    errorMessage.textContent = 'Password must be at least 8 characters long.';
                    errorMessage.classList.add('show');
                    return;
                }

                if (!/[a-zA-Z]/.test(password)) {
                    errorMessage.textContent = 'Password must contain at least one letter.';
                    errorMessage.classList.add('show');
                    return;
                }

                if (!/[0-9]/.test(password)) {
                    errorMessage.textContent = 'Password must contain at least one number.';
                    errorMessage.classList.add('show');
                    return;
                }

                if (password !== confirmPassword) {
                    errorMessage.textContent = 'Passwords do not match.';
                    errorMessage.classList.add('show');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Resetting...';

                try {
                    const response = await fetch('/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to reset password');
                    }

                    // Show success message
                    successMessage.innerHTML = '<strong>Password reset successful!</strong><br>You can now log in with your new password. Redirecting...';
                    successMessage.classList.add('show');
                    form.style.display = 'none';

                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);

                } catch (error) {
                    errorMessage.textContent = error.message;
                    errorMessage.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            });
        }

        // Start validation
        validateToken();
    </script>

    <script src="/js/chat-widget.js"></script>
</body>
</html>
