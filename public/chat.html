<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShortCircuit AI</title>
  <style>
    :root {
      --bg: #0b0f17;
      --panel: #111827;
      --panel-border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --user: #2563eb;
      --user-text: #eff6ff;
      --bot: #1f2937;
      --bot-text: #e5e7eb;
      --accent: #3b82f6;
      --danger: #ef4444;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 450px at 10% -10%, rgba(59, 130, 246, 0.18), transparent 60%),
        radial-gradient(900px 450px at 100% 0%, rgba(99, 102, 241, 0.12), transparent 55%),
        var(--bg);
    }

    .shell {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .chat-card {
      width: 100%;
      max-width: 860px;
      height: min(88vh, 860px);
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.95), rgba(12, 18, 31, 0.95));
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.user {
      justify-content: flex-end;
    }

    .row.bot,
    .row.system {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(80%, 680px);
      padding: 11px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid transparent;
    }

    .bubble.user {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: var(--user-text);
      border-color: rgba(147, 197, 253, 0.25);
      border-bottom-right-radius: 6px;
    }

    .bubble.bot {
      background: var(--bot);
      color: var(--bot-text);
      border-color: #334155;
      border-bottom-left-radius: 6px;
    }

    .bubble.system {
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.35);
      border-bottom-left-radius: 6px;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #9ca3af;
      animation: pulse 1s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.12s; }
    .dot:nth-child(3) { animation-delay: 0.24s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1.05); }
    }

    .composer {
      position: sticky;
      bottom: 0;
      background: rgba(15, 23, 42, 0.92);
      border-top: 1px solid var(--panel-border);
      padding: 12px;
      display: flex;
      gap: 10px;
    }

    .input {
      flex: 1;
      border: 1px solid #374151;
      border-radius: 12px;
      background: #0f172a;
      color: var(--text);
      font-size: 14px;
      padding: 12px 13px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .send {
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #f8fafc;
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
      min-width: 84px;
      transition: transform 0.12s ease, opacity 0.2s ease;
    }

    .send:hover { transform: translateY(-1px); }

    .send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 700px) {
      .shell {
        padding: 0;
      }

      .chat-card {
        height: 100vh;
        max-width: none;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .messages {
        padding: 14px;
      }

      .bubble {
        max-width: 90%;
      }

      .composer {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="chat-card" aria-label="ShortCircuit AI chat panel">
      <header class="header">
        <h1 class="title">ShortCircuit AI</h1>
        <span class="status" id="statusText">Ready</span>
      </header>

      <main class="messages" id="messages" aria-live="polite" aria-label="Messages">
        <div class="row bot">
          <div class="bubble bot">Hi, I am ShortCircuit AI. Ask me about courses, lessons, or engineering concepts.</div>
        </div>
      </main>

      <form class="composer" id="composer" autocomplete="off">
        <input
          id="messageInput"
          class="input"
          type="text"
          name="message"
          placeholder="Message ShortCircuit AI..."
          aria-label="Type your message"
          required
        />
        <button id="sendBtn" class="send" type="submit">Send</button>
      </form>
    </section>
  </div>

  <script>
    const API_URL = '/api/chat';

    const messagesEl = document.getElementById('messages');
    const composerEl = document.getElementById('composer');
    const inputEl = document.getElementById('messageInput');
    const sendBtnEl = document.getElementById('sendBtn');
    const statusTextEl = document.getElementById('statusText');

    let typingRowEl = null;

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, text) {
      const row = document.createElement('div');
      row.className = `row ${role}`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return row;
    }

    function showTyping() {
      if (typingRowEl) return;

      typingRowEl = document.createElement('div');
      typingRowEl.className = 'row bot';
      typingRowEl.innerHTML = `
        <div class="bubble bot">
          <span class="typing" aria-label="Assistant is typing">
            Typing
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        </div>
      `;

      messagesEl.appendChild(typingRowEl);
      scrollToBottom();
    }

    function hideTyping() {
      if (!typingRowEl) return;
      typingRowEl.remove();
      typingRowEl = null;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      addMessage('user', message);
      inputEl.value = '';
      inputEl.focus();

      sendBtnEl.disabled = true;
      inputEl.disabled = true;
      statusTextEl.textContent = 'Thinking...';
      showTyping();

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ message })
        });

        if (!response.ok) {
          let errorText = `Request failed (${response.status})`;
          try {
            const errJson = await response.json();
            if (errJson && errJson.error) errorText = errJson.error;
          } catch (_) {
            // Ignore parse error and keep default text
          }
          throw new Error(errorText);
        }

        const data = await response.json();
        const reply = (data && typeof data.reply === 'string' && data.reply.trim())
          ? data.reply.trim()
          : 'I could not generate a response this time.';

        hideTyping();
        addMessage('bot', reply);
        statusTextEl.textContent = 'Ready';
      } catch (error) {
        hideTyping();
        const messageText = error instanceof Error
          ? error.message
          : 'Something went wrong. Please try again.';
        addMessage('system', `Error: ${messageText}`);
        statusTextEl.textContent = 'Error';
      } finally {
        sendBtnEl.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
      }
    }

    composerEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      await sendMessage();
    });

    inputEl.addEventListener('keydown', async (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        await sendMessage();
      }
    });
  </script>

    <script src="/js/chat-widget.js"></script>
</body>
</html>
